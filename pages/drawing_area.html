<!doctype html>
<html lang="en">

<head>
        <link rel="stylesheet" href="../css/industrial_orange_style.css">
        <link rel="stylesheet" href="../third_party/katex.min.css">
        <link rel="stylesheet" href="../css/wireframe.css">
        <link rel="stylesheet" href="../css/main_layout.css">
        <link rel="stylesheet" href="../css/debug_bar.css">

        <meta charset="utf-8" />
        <title>Drawing Area</title>
        <script src="../js/util.js" defer></script>
        <script src="../js/scheduler.js" defer></script>
        <script src="../js/dispatcher.js" defer></script>
        <script src="../js/debug.js" defer></script>

        <script src="../js/demos/drawing_app.js" defer></script>
        <script src="../js/main.js" defer></script>

<body class="x-collapsible">

        <div class="full_page_container">
            <div class="top-margin"></div>
            <div class="main-layout">
                <div class="left-spacer">
                    <nav id="nav">
                        <a href="../index.html">Home</a>
                        <a href="resistor_divider_page.html">Resistor Divider</a>
                        <a href="drawing_area.html">Drawing Area</a>
                    </nav>
                </div>

                <div class="center-content" data-rootcontext="drawing">
                    <div class="drawable_area">
                        <style>
                        .drawable_area {
                            width: 100%;
                            height: 100%;
                            position: relative;
                            overflow: visible;
                            z-index: 1;
                            background-color: rgb(255, 0, 0, 0.2);
                        }
                        </style>
                        <svg id="drawing_svg" class="drawing_svg"></svg>
                        <style>
                        .drawing_svg {
                            width: 100%;
                            height: 100%;
                            position: relative;
                            top: 0;
                            left: 0;
                            overflow: visible;
                            z-index: 2;
                            pointer-events: none;
                        }
                        </style>
                    </div>
                </div>

                <div class="sidebar-container">
                    <div class="debug_area">
                        <div class="button_area">
                            <button class="debug_button" id="Wireframe Toggle">
                                <p>Wires</p>
                            </button>
                        </div>
                        <div class="debug_bar">
                            <div class="minicon_area">
                                <table class="contable">
                                    <tr><th id="minicon">DEFAULT</th></tr>
                                </table>
                            </div>
                            <div class="debug_body">
                                <div class="debug_scroll">
                                    <table class="debug_table">
                                        <thead>
                                            <tr><th>Key</th><th>Value</th></tr>
                                        </thead>
                                        <tbody id="debug_rows"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bottom-margin"></div>
        </div>
